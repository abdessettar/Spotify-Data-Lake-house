services:
  azurite:
    image: mcr.microsoft.com/azure-storage/azurite
    container_name: spotify_azurite
    volumes:
      - azurite_data:/data
    ports:
      - "10000:10000" # Blob
      - "10001:10001" # Queue
    # --skipApiVersionCheck to fix the API version error I got: API version 2026-02-06 is not supported by Azurite. Please upgrade Azurite to latest version and retry...
    command: "azurite --skipApiVersionCheck --blobHost 0.0.0.0 --blobPort 10000 --queueHost 0.0.0.0 --queuePort 10001"

volumes:
  azurite_data: